<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASWClassFinder | Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8; 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --error: #ef4444; 
            --success: #10b981; 
            --border: #e2e8f0; 
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.2s ease; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; min-height: 100vh; padding: 0; }
        
        /* Navbar Styling */
        .navbar {
            width: 100%;
            height: 65px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: fixed;
            top: 0;
            z-index: 1000;
        }
         .logo { font-size: 1.5rem; font-weight: 800; color: #1e293b; text-decoration: none; }
        .logo span { color: var(--primary); }
        
        .nav-back { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 600; 
            padding: 8px 16px; 
            border-radius: 10px; 
            background: #f1f5f9; 
        }
        .nav-back:hover { background: #e2e8f0; color: var(--text-main); }

        /* Main Wrapper */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 15px 40px 15px;
        }
        .box { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 650px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); position: relative; min-height: 400px; display: flex; flex-direction: column; }
        
        h2 { font-weight: 700; font-size: 1.5rem; margin: 0 0 8px 0; text-align: center; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 30px; }
        
        .nav { display: flex; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 30px; }
        .nav button { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; font-weight: 600; color: var(--text-muted); border-radius: 8px; }
        .nav button.active { background: white; color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-size: 1rem; background: #ffffff; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 1rem; margin-top: 20px; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .btn-del { background: var(--error); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.85rem; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .poster-preview { width: 100%; height: 200px; background: #f1f5f9; border: 2px dashed var(--border); border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .poster-preview img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        
        #success-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; min-height: 300px; }
        
        .pw-wrapper { position: relative; display: flex; align-items: center; }
        .toggle-btn { position: absolute; right: 12px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .toggle-btn svg { width: 20px; height: 20px; }
        
        .support-link { display: block; text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); text-decoration: none; cursor: pointer; }
        .support-link span { color: var(--primary); font-weight: 600; }
        .compulsory { color: var(--error); margin-left: 2px; }

        /* Ad Card Styling for Status List */
        .status-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 15px;
        }

        @media (max-width: 480px) {
            h2 { font-size: 1.25rem; }
            .box { padding: 25px 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar"> 
    <a href="index.html" class="logo">ASW<span>ClassFinder</span></a>
    <a href="index.html" class="nav-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back
    </a>
</nav>

<div class="main-content">
    <div class="box">
        <div id="success-overlay">
            <div style="font-size: 50px; margin-bottom: 10px;">✨</div>
            <h2 style="color: var(--success);">Submission Sent!</h2>
            <p>Your ad is now under review. You can track all your ads in the "Check Status" tab.</p>
            <button class="btn" onclick="location.reload()" style="max-width: 200px;">Post Another</button>
        </div>

        <div id="user-ui">
            <h2>ASW Control Center</h2>
            <p class="subtitle">Securely post and track your advertisements</p>
            
            <div class="nav">
                <button id="btn-post" class="active" onclick="showTab('post')">Post Ad</button>
                <button id="btn-status" onclick="showTab('status')">Check Status</button>
            </div>

            <div id="tab-post">
                <div class="grid">
                    <div>
                        <label>Tutor Poster <span class="compulsory">*</span></label>
                        <div class="poster-preview">
                            <img id="poster-img" src="">
                            <span id="placeholder-text">Preview</span>
                        </div>
                        <input type="file" id="file-input" accept="image/*" onchange="loadPreview(event)" required>
                    </div>
                    <div><label>Name <span class="compulsory">*</span></label><input type="text" id="name" placeholder="Kamal Perera" required></div>
                    <div><label>Subject <span class="compulsory">*</span></label><input type="text" id="subject" placeholder="Physics" required></div>
                    <div><label>Contact Number <span class="compulsory">*</span></label><input type="text" id="contact" placeholder="0712345678" required></div>
                    <div><label>WhatsApp Number <span class="compulsory">*</span></label><input type="text" id="whatsapp" placeholder="0712345678" required></div>
                    <div><label>Location <span class="compulsory">*</span></label><input type="text" id="loc" placeholder="Kandy" required></div>
                    <div><label>Grades <span class="compulsory">*</span></label><input type="text" id="grades" placeholder="A/L, O/L" required></div>
                    <div>
                        <label>Class Type <span class="compulsory">*</span></label>
                        <select id="type" required>
                            <option>Individual</option>
                            <option>Group</option>
                            <option>Individual & Group </option>
                        </select>
                    </div>
                    <div>
                        <label>Login Credentials <span class="compulsory">*</span></label>
                        <input type="email" id="email" placeholder="Email" style="margin-bottom:10px" required>
                        <div class="pw-wrapper">
                            <input type="password" id="pw" placeholder="Create Status Password" required>
                            <span class="toggle-btn" onclick="toggleVisibility('pw')">
                                <svg id="eye-pw" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12.013a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </span>
                        </div>
                    </div>
                    <div><label>Fee (Rs.) <span class="compulsory">*</span></label><input type="text" id="fee" placeholder="3000" required></div>
                    <div>
                        <label>Description <span class="compulsory">*</span></label>
                        <textarea id="desc" rows="3" placeholder="Min 100 words..." required></textarea>
                        <p id="words" style="color:var(--error); font-size:11px; font-weight:700;">0 / 100 words</p>
                    </div>
                </div>
                <button class="btn" id="subBtn" onclick="submitAd()" disabled>Submit Ad</button>
                <div class="support-link" onclick="contactAdmin('general')">Need Assistance? <span>Contact Us</span></div>
            </div>

            <div id="tab-status" style="display:none;">
                <label>Email</label>
                <input type="email" id="logEmail" placeholder="your@email.com" style="margin-bottom:15px">
                <label>Password</label>
                <div class="pw-wrapper" style="margin-bottom:15px">
                    <input type="password" id="logPw" placeholder="••••••••">
                    <span class="toggle-btn" onclick="toggleVisibility('logPw')">
                        <svg id="eye-logPw" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12.013a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </span>
                </div>
                <button class="btn" onclick="checkStatus()">Search My Ads</button>
                <div class="support-link" onclick="contactAdmin('recovery')">Forgot credentials? <span>Contact Us</span></div>
                
                <div id="status-results" style="display:none; margin-top:25px;">
                    <h3 style="font-size: 1rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Found Submissions:</h3>
                    <div id="status-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://nlwfmersznyaglxcpgds.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sd2ZtZXJzem55YWdseGNwZ2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjgyNzksImV4cCI6MjA4ODYwNDI3OX0.8Yd96WPdScG4Fp4PD3DjIRQSS7qIDdkmUm_1y1HTbEE');
    const ADMIN_WA = "94707763739";

    function showTab(t) {
        document.getElementById('tab-post').style.display = t=='post'?'block':'none';
        document.getElementById('tab-status').style.display = t=='status'?'block':'none';
        document.getElementById('btn-post').className = t=='post'?'active':'';
        document.getElementById('btn-status').className = t=='status'?'active':'';
    }

    function toggleVisibility(id) {
        const input = document.getElementById(id);
        const svg = document.getElementById('eye-' + id);
        if (input.type === "password") {
            input.type = "text";
            svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
        } else {
            input.type = "password";
            svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12.013a3 3 0 11-6 0 3 3 0 016 0z" />';
        }
    }

    function loadPreview(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = () => { 
                document.getElementById('poster-img').src = reader.result;
                document.getElementById('poster-img').style.display = 'block';
                document.getElementById('placeholder-text').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    document.getElementById('desc').oninput = function() {
        let count = this.value.trim().split(/\s+/).filter(w=>w.length>0).length;
        document.getElementById('words').innerText = count + " / 100 words";
        document.getElementById('subBtn').disabled = count < 100;
        document.getElementById('words').style.color = count >= 100 ? "var(--success)" : "var(--error)";
    };

    async function submitAd() {
        const btn = document.getElementById('subBtn');
        const file = document.getElementById('file-input').files[0];
        
        const compulsoryFields = ['name', 'subject', 'contact', 'whatsapp', 'loc', 'grades', 'email', 'pw', 'fee', 'desc'];
        for(let id of compulsoryFields) {
            if(!document.getElementById(id).value.trim()) {
                alert("Please fill all fields marked with *");
                return;
            }
        }
        if(!file) return alert("Please upload a poster");

        btn.disabled = true;
        btn.innerText = "Uploading...";

        let finalUrl = "";
        if(file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data } = await _sb.storage.from('ads').upload(`posters/${fileName}`, file);
            if(data) finalUrl = _sb.storage.from('ads').getPublicUrl(`posters/${fileName}`).data.publicUrl;
        }

        const { error } = await _sb.from('pending_ads').insert([{
            name: document.getElementById('name').value, 
            subject: document.getElementById('subject').value,
            contact: document.getElementById('contact').value,
            whatsapp: document.getElementById('whatsapp').value,
            email: document.getElementById('email').value,
            view_password: document.getElementById('pw').value,
            location: document.getElementById('loc').value,
            grades: document.getElementById('grades').value,
            fee: document.getElementById('fee').value,
            details: document.getElementById('desc').value,
            type: document.getElementById('type').value,
            img_url: finalUrl
        }]);

        if(error) { alert(error.message); btn.disabled = false; }
        else { 
            document.getElementById('user-ui').style.display = 'none';
            document.getElementById('success-overlay').style.display = 'flex'; 
        }
    }

    async function checkStatus() {
        const email = document.getElementById('logEmail').value;
        const pw = document.getElementById('logPw').value;
        if(!email || !pw) return alert("Enter credentials");

        const { data, error } = await _sb.from('pending_ads')
            .select('*')
            .eq('email', email)
            .eq('view_password', pw)
            .order('created_at', { ascending: false });

        const resultsDiv = document.getElementById('status-results');
        const list = document.getElementById('status-list');
        list.innerHTML = "";

        if(data && data.length > 0) {
            resultsDiv.style.display = 'block';
            data.forEach(ad => {
                const isApproved = ad.status.toLowerCase() === 'approved';
                const card = document.createElement('div');
                card.className = "status-card";
                
                let note = (ad.admin_notes && !ad.admin_notes.includes("under review")) 
                    ? `<b>Admin:</b> ${ad.admin_notes}` 
                    : "Under review by our team.";

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                        <h4 style="margin:0; color:var(--primary);">${ad.subject}</h4>
                        <span style="font-size:10px; color:var(--text-muted);">${new Date(ad.created_at).toLocaleDateString()}</span>
                    </div>
                    <div style="font-size:13px; margin-bottom:10px;">
                        Status: <b style="color:${isApproved ? 'var(--success)' : '#b45309'}">${ad.status.toUpperCase()}</b>
                    </div>
                    <div style="background:#fff; padding:10px; border-radius:8px; font-size:12px; border:1px solid var(--border);">
                        ${note}
                    </div>
                    ${isApproved ? `<button class="btn-del" onclick="contactAdmin('delete', 'Subject: ${ad.subject}\\nEmail: ${ad.email}')"><span>🗑️</span> Request Deletion</button>` : ''}
                `;
                list.appendChild(card);
            });
        } else {
            alert("No ads found.");
        }
    }

    function contactAdmin(reason, details = "") {
        let msg = "";
        if(reason === 'recovery') {
            msg = "Hi Admin, I forgot my login credentials for ASWClassFinder. ";
        } else if(reason === 'delete') {
            msg = `Hi Admin, I want to delete my ad:\n\n${details}`;
        } else if(reason === 'general') {
            msg = "Hello Admin, I need assistance with the ASW Control Center.";
        }
        window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
